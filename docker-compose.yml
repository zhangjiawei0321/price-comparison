version: "3.3"

services:
  price-monitor:
    build: .
    ports:
      - "${WEB_PORT:-8000}:${WEB_PORT:-8000}"
    env_file:
      - .env
    environment:
      PLAYWRIGHT_CHANNEL: chromium
      PRICE_USER_DATA_DIR: /data/profile
      PRICE_DB_PATH: /data/prices.db
    volumes:
      - ./docker-data:/data
    command:
      - node
      - index.js
      - web
      - --port
      - "${WEB_PORT:-8000}"
      - --monitor
      - --intervalSeconds
      - "3600"
      - --dropPercent
      - "5"
